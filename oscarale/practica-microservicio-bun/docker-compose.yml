services:
  postgres:
    image: postgres:latest
    container_name: postgres_db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: escuela

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  bun_app:
    build: .
    image: practica-microservicio-bun:latest

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      DB_HOST: postgres
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: escuela
      DB_PORT: 5432

    depends_on:
      - postgres

volumes:
  postgres_data: